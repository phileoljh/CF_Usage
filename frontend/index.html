<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Usage Dashboard</title>
    <!-- 引入 Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 動態背景裝飾球 -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header class="dashboard-header">
            <div>
                <h1>Cloudflare 資源用量監控</h1>
                <p class="subtitle">即時監控您的免費額度與使用狀況</p>
            </div>
            <div class="last-updated">
                最後更新時間：<span id="update-time">載入中...</span>
            </div>
        </header>

        <!-- 骨架載入區塊 (資料未回來前顯示) -->
        <main class="grid-container" id="loading-state">
            <div class="card glass-card skeleton"></div>
            <div class="card glass-card skeleton"></div>
            <div class="card glass-card skeleton"></div>
            <div class="card glass-card skeleton"></div>
        </main>

        <!-- 實際資料圖表區塊 -->
        <main class="grid-container hidden" id="dashboard-data">
            <!-- 卡片內容將由 JavaScript 動態生成 -->
        </main>

    </div>

    <!-- 將卡片的 Template 定義在 HTML 內方便維護 -->
    <template id="card-template">
        <div class="card glass-card">
            <div class="card-header">
                <h2 class="service-name">Service Name</h2>
                <span class="percentage-badge">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-track">
                    <div class="progress-bar"></div>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-label">已使用</div>
                    <div class="stat-value used-val">0</div>
                </div>
                <div class="stat-item text-right">
                    <div class="stat-label">免費額度</div>
                    <div class="stat-value limit-val">0</div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
